<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DHT Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --text: #f0eee8;
      --text-muted: #7a7a8a;
      --text-dim: #3a3a4a;
      --accent: #e8c97a;
      --accent-dim: rgba(232,201,122,0.12);
      --accent-glow: rgba(232,201,122,0.3);
      --radius: 6px;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }

    html { background: var(--bg); color: var(--text); font-family: var(--font-sans); }
    body { min-height: 100vh; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; gap: 1rem;
      padding: 0 2rem; height: 60px;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-back {
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--text-muted); text-decoration: none;
      font-size: 0.82rem; font-weight: 500; transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }
    .nav-logo {
      font-family: var(--font-serif); font-size: 1.2rem; letter-spacing: -0.02em;
      color: var(--text); text-decoration: none; margin-right: auto;
    }
    .nav-logo span { color: var(--accent); }

    /* ── BACKDROP ── */
    .backdrop-wrap {
      position: relative; margin-top: 60px;
      width: 100%; height: clamp(220px, 40vw, 420px);
      overflow: hidden;
    }
    .backdrop-img {
      width: 100%; height: 100%; object-fit: cover;
      filter: brightness(0.4);
    }
    .backdrop-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, var(--bg) 100%);
    }

    /* ── MAIN LAYOUT ── */
    .detail-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 2.5rem;
      max-width: 1100px;
      margin: -80px auto 0;
      padding: 0 2rem;
      position: relative; z-index: 10;
    }

    /* ── POSTER COL ── */
    .poster-col { display: flex; flex-direction: column; gap: 1rem; }
    .detail-poster {
      width: 100%; border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      aspect-ratio: 2/3; object-fit: cover;
      background: var(--surface2);
    }

    /* ── ACTIONS ── */
    .quality-buttons { display: flex; flex-direction: column; gap: 0.5rem; }
    .quality-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.2rem;
    }
    .quality-btn {
      width: 100%; padding: 0.6rem 1rem;
      border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted);
      font-family: var(--font-sans); font-size: 0.82rem; font-weight: 500;
      cursor: pointer; text-align: left;
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.15s;
    }
    .quality-btn:hover { border-color: var(--accent); color: var(--accent); }
    .quality-btn.selected {
      background: var(--accent); border-color: var(--accent);
      color: #0a0a0f; font-weight: 600;
    }
    .quality-size { font-size: 0.7rem; opacity: 0.7; }

    .play-btn {
      width: 100%; padding: 0.75rem;
      border-radius: var(--radius); border: none;
      background: var(--accent); color: #0a0a0f;
      font-family: var(--font-serif); font-size: 1rem;
      cursor: pointer; font-weight: 400; letter-spacing: 0.01em;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: opacity 0.15s, transform 0.15s;
    }
    .play-btn:hover { opacity: 0.9; transform: scale(1.01); }
    .play-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .watchlist-btn {
      width: 100%; padding: 0.6rem;
      border-radius: var(--radius); border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      font-family: var(--font-sans); font-size: 0.82rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.15s;
    }
    .watchlist-btn:hover, .watchlist-btn.saved {
      border-color: var(--accent); color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── INFO COL ── */
    .info-col { padding-top: 1rem; }

    .badges { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .badge {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 3px;
      border: 1px solid var(--border); color: var(--text-muted);
    }
    .badge.rating-badge { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .detail-title {
      font-family: var(--font-serif); font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 400; line-height: 1.1; letter-spacing: -0.02em;
      color: var(--text); margin-bottom: 0.4rem;
    }
    .detail-tagline {
      font-style: italic; color: var(--text-muted); font-size: 0.95rem;
      margin-bottom: 1.2rem;
    }

    .meta-row {
      display: flex; flex-wrap: wrap; gap: 1rem;
      font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem;
    }
    .meta-item { display: flex; align-items: center; gap: 0.3rem; }
    .meta-sep { color: var(--text-dim); }

    .synopsis {
      font-size: 0.9rem; line-height: 1.7; color: var(--text-muted);
      max-width: 640px; margin-bottom: 2rem;
    }

    /* ── CAST ── */
    .section-head {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-dim);
      border-top: 1px solid var(--border); padding-top: 1.5rem;
      margin-bottom: 1rem;
    }
    .cast-grid {
      display: flex; gap: 1rem; overflow-x: auto;
      scrollbar-width: none; padding-bottom: 0.5rem;
      margin-bottom: 2rem;
    }
    .cast-grid::-webkit-scrollbar { display: none; }
    .cast-card {
      flex-shrink: 0; width: 80px; text-align: center;
    }
    .cast-photo {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--border);
      background: var(--surface2); display: block; margin: 0 auto 0.4rem;
    }
    .cast-photo-placeholder {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--surface2); display: flex; align-items: center;
      justify-content: center; margin: 0 auto 0.4rem;
      border: 2px solid var(--border); font-size: 1.4rem;
    }
    .cast-name { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); line-height: 1.3; }
    .cast-char { font-size: 0.65rem; color: var(--text-dim); }

    /* ── RELATED ── */
    .related-row {
      display: flex; gap: 1rem; overflow-x: auto;
      scrollbar-width: none; padding-bottom: 2rem;
    }
    .related-row::-webkit-scrollbar { display: none; }
    .related-card {
      flex-shrink: 0; width: 130px; cursor: pointer;
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border); background: var(--surface);
      transition: transform 0.2s;
    }
    .related-card:hover { transform: translateY(-3px); }
    .related-poster {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      background: var(--surface2); display: block;
    }
    .related-info { padding: 0.5rem 0.6rem 0.6rem; }
    .related-title { font-size: 0.75rem; font-weight: 500; color: var(--text); margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .related-year { font-size: 0.68rem; color: var(--text-muted); }

    /* ── LOADING ── */
    .loading-state {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; font-family: var(--font-serif);
      font-size: 1.2rem; color: var(--text-muted); font-style: italic;
    }

    /* ── SKELETON ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .sk {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 0.82rem; padding: 0.6rem 1.2rem;
      border-radius: 40px; transition: transform 0.3s; z-index: 200; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .detail-layout {
        grid-template-columns: 140px 1fr;
        gap: 1.5rem;
        padding: 0 1rem;
        margin-top: -60px;
      }
      .backdrop-wrap { height: 200px; }
      .quality-btn, .play-btn, .watchlist-btn { font-size: 0.78rem; }
    }
    @media (max-width: 480px) {
      .detail-layout { grid-template-columns: 1fr; }
      .poster-col { flex-direction: row; flex-wrap: wrap; }
      .detail-poster { width: 120px; }
      .quality-buttons, .play-btn, .watchlist-btn { flex: 1; min-width: 120px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-back" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Browse
    </a>
    <a class="nav-logo" href="index.html">DHT <span>Stream</span></a>
  </nav>

  <div id="backdropWrap" class="backdrop-wrap" style="display:none">
    <img id="backdropImg" class="backdrop-img" alt="" />
    <div class="backdrop-gradient"></div>
  </div>

  <div id="loadingState" class="loading-state">Loading…</div>

  <div id="detailLayout" class="detail-layout" style="display:none">
    <!-- POSTER COL -->
    <div class="poster-col">
      <img id="posterImg" class="detail-poster" alt="" />
      <div class="quality-buttons">
        <div class="quality-label">Select Quality</div>
        <div id="qualityBtns"></div>
      </div>
      <button class="play-btn" id="playBtn" disabled>
        ▶ &nbsp;Play
      </button>
      <button class="watchlist-btn" id="watchlistBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span id="watchlistBtnLabel">Save to Watchlist</span>
      </button>
    </div>

    <!-- INFO COL -->
    <div class="info-col">
      <div class="badges" id="badgesRow"></div>
      <h1 class="detail-title" id="detailTitle">—</h1>
      <p class="detail-tagline" id="detailTagline"></p>
      <div class="meta-row" id="metaRow"></div>
      <p class="synopsis" id="synopsis"></p>

      <!-- Cast -->
      <div id="castSection" style="display:none">
        <div class="section-head">Cast</div>
        <div class="cast-grid" id="castGrid"></div>
      </div>

      <!-- Related -->
      <div id="relatedSection" style="display:none">
        <div class="section-head">More like this</div>
        <div class="related-row" id="relatedRow"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const WORKER = 'https://fancy-bar-b4d2.mogakanewton0.workers.dev';
    const TMDB_IMG = 'https://image.tmdb.org/t/p/';

    const params = new URLSearchParams(location.search);
    const movieId = params.get('id');
    const imdbId  = params.get('imdb_id');

    let selectedTorrent = null;
    let movieData = null;
    let watchlist = JSON.parse(localStorage.getItem('dht_watchlist') || '[]');

    // ── Trackers for magnet ──
    const TRACKERS = [
      'udp://tracker.opentrackr.org:1337/announce',
      'udp://open.tracker.cl:1337/announce',
      'udp://tracker.torrent.eu.org:451/announce',
      'udp://exodus.desync.com:6969/announce'
    ].map(t => `&tr=${encodeURIComponent(t)}`).join('');

    function buildMagnet(torrent, title) {
      return `magnet:?xt=urn:btih:${torrent.hash}&dn=${encodeURIComponent(title)}${TRACKERS}`;
    }

    async function load() {
      if (!movieId) { document.getElementById('loadingState').textContent = 'No movie specified.'; return; }

      // Fetch YTS movie detail
      const ytsRes = await fetch(`${WORKER}/movie?movie_id=${movieId}&with_cast=true`).then(r => r.json()).catch(() => null);
      if (!ytsRes?.data?.movie) { document.getElementById('loadingState').textContent = 'Movie not found.'; return; }
      movieData = ytsRes.data.movie;
      document.title = `${movieData.title} — DHT Stream`;

      // Fetch TMDB metadata in parallel
      const tmdbRes = imdbId
        ? await fetch(`${WORKER}/meta?imdb_id=${imdbId}`).then(r => r.json()).catch(() => null)
        : null;

      render(movieData, tmdbRes);
      fetchRelated(movieData.genres?.[0] || '');
    }

    function render(m, tmdb) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('detailLayout').style.display = 'grid';

      // Backdrop
      const backdrop = tmdb?.movie_results?.[0]?.backdrop_path || tmdb?.tv_results?.[0]?.backdrop_path;
      if (backdrop) {
        const wrap = document.getElementById('backdropWrap');
        document.getElementById('backdropImg').src = `${TMDB_IMG}w1280${backdrop}`;
        wrap.style.display = 'block';
      }

      // Poster
      const tmdbPoster = tmdb?.movie_results?.[0]?.poster_path;
      const poster = tmdbPoster ? `${TMDB_IMG}w342${tmdbPoster}` : m.large_cover_image || m.medium_cover_image || '';
      const posterEl = document.getElementById('posterImg');
      if (poster) posterEl.src = poster;
      posterEl.alt = m.title;

      // Badges
      const rating = tmdb?.movie_results?.[0]?.vote_average || m.rating;
      let badges = '';
      if (rating) badges += `<span class="badge rating-badge">★ ${Number(rating).toFixed(1)}</span>`;
      (m.genres || []).slice(0, 3).forEach(g => { badges += `<span class="badge">${g}</span>`; });
      document.getElementById('badgesRow').innerHTML = badges;

      // Title & tagline
      document.getElementById('detailTitle').textContent = m.title;
      const tagline = tmdb?.movie_results?.[0]?.overview?.split('.')[0];
      if (tagline) document.getElementById('detailTagline').textContent = tagline + '.';

      // Meta row
      const meta = [];
      if (m.year) meta.push(`<span class="meta-item">📅 ${m.year}</span>`);
      if (m.runtime) meta.push(`<span class="meta-item">⏱ ${m.runtime} min</span>`);
      if (m.language) meta.push(`<span class="meta-item">🌐 ${m.language.toUpperCase()}</span>`);
      if (m.mpa_rating) meta.push(`<span class="meta-item">🎬 ${m.mpa_rating}</span>`);
      document.getElementById('metaRow').innerHTML = meta.join('<span class="meta-sep"> · </span>');

      // Synopsis
      const synopsis = tmdb?.movie_results?.[0]?.overview || m.description_full || m.description_intro || '';
      document.getElementById('synopsis').textContent = synopsis;

      // Quality buttons
      const torrents = m.torrents || [];
      const qualityBtns = document.getElementById('qualityBtns');
      qualityBtns.innerHTML = torrents.map((t, i) => `
        <button class="quality-btn ${i === 0 ? 'selected' : ''}"
          data-idx="${i}"
          onclick="selectQuality(this, ${i})">
          <span>${t.quality} · ${t.type || 'web'}</span>
          <span class="quality-size">${t.size}</span>
        </button>
      `).join('');

      if (torrents.length) {
        selectedTorrent = torrents[0];
        document.getElementById('playBtn').disabled = false;
      }

      // Cast
      const cast = m.cast || [];
      if (cast.length) {
        document.getElementById('castSection').style.display = 'block';
        document.getElementById('castGrid').innerHTML = cast.slice(0, 12).map(c => `
          <div class="cast-card">
            ${c.url_small_image
              ? `<img class="cast-photo" src="${c.url_small_image}" alt="${c.name}" loading="lazy" onerror="this.outerHTML='<div class=cast-photo-placeholder>👤</div>'" />`
              : `<div class="cast-photo-placeholder">👤</div>`}
            <div class="cast-name">${c.name}</div>
            ${c.character_name ? `<div class="cast-char">${c.character_name}</div>` : ''}
          </div>
        `).join('');
      }

      // Watchlist button
      updateWatchlistBtn();
    }

    function selectQuality(btn, idx) {
      document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTorrent = movieData.torrents[idx];
    }

    document.getElementById('playBtn').addEventListener('click', () => {
      if (!selectedTorrent || !movieData) return;
      const magnet = buildMagnet(selectedTorrent, movieData.title);
      const poster = document.getElementById('posterImg').src || '';
      location.href = `player.html?magnet=${encodeURIComponent(magnet)}&title=${encodeURIComponent(movieData.title)}&poster=${encodeURIComponent(poster)}&movie_id=${movieId}&imdb_id=${imdbId || ''}`;
    });

    document.getElementById('watchlistBtn').addEventListener('click', () => {
      const id = parseInt(movieId);
      const idx = watchlist.indexOf(id);
      if (idx === -1) { watchlist.push(id); showToast('Added to watchlist'); }
      else { watchlist.splice(idx, 1); showToast('Removed from watchlist'); }
      localStorage.setItem('dht_watchlist', JSON.stringify(watchlist));
      updateWatchlistBtn();
    });

    function updateWatchlistBtn() {
      const id = parseInt(movieId);
      const saved = watchlist.includes(id);
      document.getElementById('watchlistBtn').classList.toggle('saved', saved);
      document.getElementById('watchlistBtnLabel').textContent = saved ? 'Saved ★' : 'Save to Watchlist';
    }

    async function fetchRelated(genre) {
      if (!genre) return;
      try {
        const res = await fetch(`${WORKER}/movies?genre=${genre}&limit=12&sort_by=rating`);
        const data = await res.json();
        const movies = (data.data?.movies || []).filter(m => String(m.id) !== movieId).slice(0, 10);
        if (!movies.length) return;
        document.getElementById('relatedSection').style.display = 'block';
        document.getElementById('relatedRow').innerHTML = movies.map(m => `
          <div class="related-card" onclick="location.href='movie.html?id=${m.id}&imdb_id=${m.imdb_code}'">
            <img class="related-poster" src="${m.medium_cover_image || ''}" alt="${m.title}" loading="lazy" />
            <div class="related-info">
              <div class="related-title">${m.title}</div>
              <div class="related-year">${m.year}</div>
            </div>
          </div>
        `).join('');
      } catch(e) { /* silently skip */ }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    load();
  </script>
</body>
</html>
