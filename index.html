<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DHT Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --text: #f0eee8;
      --text-muted: #7a7a8a;
      --text-dim: #3a3a4a;
      --accent: #e8c97a;
      --accent-dim: rgba(232,201,122,0.12);
      --accent-glow: rgba(232,201,122,0.25);
      --red: #e8706a;
      --radius: 6px;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }

    html { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 16px; }
    body { min-height: 100vh; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 60px;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-serif); font-size: 1.4rem; letter-spacing: -0.02em;
      color: var(--text); text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a {
      font-size: 0.85rem; font-weight: 500; color: var(--text-muted);
      text-decoration: none; letter-spacing: 0.03em; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-links a.active { color: var(--accent); }

    /* ── HERO SEARCH ── */
    .hero {
      padding: 4rem 2rem 2.5rem;
      text-align: center;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(232,201,122,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-family: var(--font-serif); font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400; letter-spacing: -0.02em; color: var(--text);
      margin-bottom: 0.4rem; line-height: 1.1;
    }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 2rem; }

    .search-wrap {
      max-width: 540px; margin: 0 auto;
      position: relative;
    }
    .search-wrap input {
      width: 100%; padding: 0.85rem 1.2rem 0.85rem 3rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 40px; color: var(--text); font-family: var(--font-sans);
      font-size: 0.95rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input:focus {
      border-color: rgba(232,201,122,0.4);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .search-wrap input::placeholder { color: var(--text-dim); }
    .search-icon {
      position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none;
    }

    /* ── FILTERS ── */
    .filters-bar {
      padding: 0 2rem 0;
      display: flex; align-items: center; gap: 1rem;
      overflow-x: auto; scrollbar-width: none;
    }
    .filters-bar::-webkit-scrollbar { display: none; }

    .filter-label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-dim); white-space: nowrap;
      flex-shrink: 0;
    }
    .genre-pills { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .pill {
      padding: 0.35rem 0.9rem; border-radius: 40px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); font-family: var(--font-sans);
      font-size: 0.78rem; font-weight: 500; cursor: pointer;
      white-space: nowrap; transition: all 0.15s;
    }
    .pill:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .pill.active {
      background: var(--accent); border-color: var(--accent);
      color: #0a0a0f; font-weight: 600;
    }

    .sort-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

    .sort-select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); font-family: var(--font-sans);
      font-size: 0.78rem; padding: 0.35rem 0.7rem; border-radius: 4px;
      cursor: pointer; outline: none; flex-shrink: 0;
    }

    /* ── WATCHLIST TOGGLE ── */
    .watchlist-toggle {
      margin-left: auto; display: flex; align-items: center; gap: 0.5rem;
      background: none; border: 1px solid var(--border); border-radius: 4px;
      padding: 0.35rem 0.75rem; color: var(--text-muted); font-family: var(--font-sans);
      font-size: 0.78rem; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .watchlist-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .watchlist-toggle.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── GRID ── */
    .grid-section { padding: 1.5rem 2rem 2rem; }
    .section-meta {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .section-title { font-family: var(--font-serif); font-size: 1.1rem; color: var(--text); }
    .section-count { font-size: 0.78rem; color: var(--text-dim); }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    /* ── MOVIE CARD ── */
    .card {
      position: relative; cursor: pointer; border-radius: var(--radius);
      overflow: hidden; background: var(--surface);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.4s both;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-poster {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      display: block; background: var(--surface2);
    }
    .card-poster-placeholder {
      width: 100%; aspect-ratio: 2/3;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 2rem;
    }

    .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
      padding: 2rem 0.7rem 0.7rem;
      opacity: 0; transition: opacity 0.2s;
    }
    .card:hover .card-overlay { opacity: 1; }
    .overlay-play {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); margin: 0 auto 0.5rem;
      color: #0a0a0f; font-size: 1rem;
    }
    .overlay-quality { display: flex; gap: 0.3rem; justify-content: center; flex-wrap: wrap; }
    .quality-badge {
      font-size: 0.62rem; font-weight: 700; padding: 0.1rem 0.4rem;
      border-radius: 2px; background: rgba(255,255,255,0.12); color: var(--text);
      letter-spacing: 0.04em;
    }
    .quality-badge.hd { background: var(--accent-dim); color: var(--accent); }

    .card-info { padding: 0.6rem 0.7rem 0.7rem; }
    .card-title {
      font-size: 0.82rem; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }
    .card-meta { display: flex; align-items: center; gap: 0.5rem; }
    .card-year { font-size: 0.72rem; color: var(--text-muted); }
    .card-rating {
      display: flex; align-items: center; gap: 0.2rem;
      font-size: 0.72rem; color: var(--accent); font-weight: 600;
    }

    .card-watchlist {
      position: absolute; top: 0.5rem; right: 0.5rem;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(10,10,15,0.8); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.7rem; color: var(--text-muted);
      transition: all 0.15s; backdrop-filter: blur(4px);
    }
    .card-watchlist:hover, .card-watchlist.saved { color: var(--accent); border-color: var(--accent); }

    /* ── SKELETON ── */
    .skeleton { animation: shimmer 1.5s infinite; }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton-card {
      border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border);
    }
    .skeleton-poster {
      width: 100%; aspect-ratio: 2/3;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-info { padding: 0.6rem 0.7rem 0.7rem; background: var(--surface); }
    .skeleton-line {
      height: 10px; border-radius: 4px; margin-bottom: 0.4rem;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
      background-size: 800px 100%; animation: shimmer 1.5s infinite;
    }

    /* ── PAGINATION ── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; padding: 2rem;
    }
    .page-btn {
      padding: 0.5rem 1rem; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); font-family: var(--font-sans); font-size: 0.82rem;
      cursor: pointer; transition: all 0.15s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0f; font-weight: 600; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center; padding: 5rem 2rem; color: var(--text-muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
    .empty h3 { font-family: var(--font-serif); font-size: 1.3rem; color: var(--text); margin-bottom: 0.5rem; }
    .empty p { font-size: 0.85rem; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 0.82rem; padding: 0.6rem 1.2rem;
      border-radius: 40px; backdrop-filter: blur(8px);
      transition: transform 0.3s; z-index: 200; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .hero { padding: 2.5rem 1rem 1.5rem; }
      .filters-bar { padding: 0 1rem; }
      .grid-section { padding: 1.2rem 1rem 2rem; }
      .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">DHT <span>Stream</span></a>
    <div class="nav-links">
      <a href="index.html" class="active">Browse</a>
      <a href="index.html?watchlist=1">Watchlist</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Stream <em>anything.</em><br>Own nothing.</h1>
    <p>50,000+ movies from the public DHT swarm — free, serverless, yours.</p>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search movies…" autocomplete="off" />
    </div>
  </section>

  <div class="filters-bar">
    <span class="filter-label">Genre</span>
    <div class="genre-pills" id="genrePills">
      <button class="pill active" data-genre="">All</button>
      <button class="pill" data-genre="action">Action</button>
      <button class="pill" data-genre="drama">Drama</button>
      <button class="pill" data-genre="comedy">Comedy</button>
      <button class="pill" data-genre="horror">Horror</button>
      <button class="pill" data-genre="sci-fi">Sci-Fi</button>
      <button class="pill" data-genre="animation">Animation</button>
      <button class="pill" data-genre="thriller">Thriller</button>
      <button class="pill" data-genre="romance">Romance</button>
      <button class="pill" data-genre="documentary">Documentary</button>
      <button class="pill" data-genre="crime">Crime</button>
      <button class="pill" data-genre="fantasy">Fantasy</button>
    </div>
    <div class="sort-divider"></div>
    <select class="sort-select" id="sortSelect">
      <option value="download_count">Most Popular</option>
      <option value="rating">Top Rated</option>
      <option value="date_added">Newest</option>
      <option value="year">By Year</option>
      <option value="title">A–Z</option>
    </select>
    <button class="watchlist-toggle" id="watchlistToggle">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      Watchlist
    </button>
  </div>

  <div class="grid-section">
    <div class="section-meta">
      <span class="section-title" id="sectionTitle">Popular Movies</span>
      <span class="section-count" id="sectionCount"></span>
    </div>
    <div class="movie-grid" id="movieGrid"></div>
  </div>

  <div class="pagination" id="pagination"></div>

  <div class="toast" id="toast"></div>

  <script>
    const WORKER = 'https://fancy-bar-b4d2.mogakanewton0.workers.dev';
    const TMDB_IMG = 'https://image.tmdb.org/t/p/w342';

    let state = {
      query: '', genre: '', sort: 'download_count',
      page: 1, totalPages: 1, totalMovies: 0,
      watchlistOnly: false, debounceTimer: null
    };

    let watchlist = JSON.parse(localStorage.getItem('dht_watchlist') || '[]');
    let tmdbCache = JSON.parse(localStorage.getItem('dht_tmdb_cache') || '{}');

    // ── Init ──
    const params = new URLSearchParams(location.search);
    if (params.get('watchlist') === '1') {
      state.watchlistOnly = true;
      document.getElementById('watchlistToggle').classList.add('active');
    }

    async function fetchMovies() {
      if (state.watchlistOnly) { renderWatchlist(); return; }
      renderSkeletons();
      const url = new URL(`${WORKER}/movies`);
      if (state.query) url.searchParams.set('query', state.query);
      if (state.genre) url.searchParams.set('genre', state.genre);
      url.searchParams.set('sort_by', state.sort);
      url.searchParams.set('page', state.page);
      url.searchParams.set('limit', '20');

      try {
        const res = await fetch(url);
        const data = await res.json();
        const movies = data.data?.movies || [];
        state.totalMovies = data.data?.movie_count || 0;
        state.totalPages = Math.ceil(state.totalMovies / 20);
        renderMovies(movies);
        renderPagination();
        updateSectionMeta();
      } catch (e) {
        console.error(e);
        renderError();
      }
    }

    function renderSkeletons(n = 20) {
      const grid = document.getElementById('movieGrid');
      grid.innerHTML = Array.from({length: n}, () => `
        <div class="skeleton-card">
          <div class="skeleton-poster"></div>
          <div class="skeleton-info">
            <div class="skeleton-line" style="width:80%"></div>
            <div class="skeleton-line" style="width:50%"></div>
          </div>
        </div>
      `).join('');
    }

    function renderMovies(movies) {
      const grid = document.getElementById('movieGrid');
      if (!movies.length) { grid.innerHTML = emptyState('No movies found', 'Try a different search or genre.'); return; }
      grid.innerHTML = movies.map((m, i) => movieCard(m, i)).join('');
    }

    function movieCard(m, i) {
      const saved = watchlist.includes(m.id);
      const poster = m.medium_cover_image || '';
      const qualities = (m.torrents || []).map(t => t.quality);
      const hasHD = qualities.some(q => q === '1080p' || q === '2160p');
      const delay = Math.min(i * 30, 300);
      return `
        <div class="card" style="animation-delay:${delay}ms" onclick="goToMovie(${m.id}, '${escQ(m.imdb_code)}')">
          ${poster
            ? `<img class="card-poster" src="${poster}" alt="${escQ(m.title)}" loading="lazy" />`
            : `<div class="card-poster-placeholder">🎬</div>`}
          <div class="card-overlay">
            <div class="overlay-play">▶</div>
            <div class="overlay-quality">
              ${qualities.slice(0,3).map(q => `<span class="quality-badge ${q==='1080p'||q==='2160p'?'hd':''}">${q}</span>`).join('')}
            </div>
          </div>
          <button class="card-watchlist ${saved?'saved':''}" onclick="toggleWatchlist(event,${m.id})"
            title="${saved?'Remove from watchlist':'Add to watchlist'}">
            ${saved ? '★' : '☆'}
          </button>
          <div class="card-info">
            <div class="card-title">${m.title}</div>
            <div class="card-meta">
              <span class="card-year">${m.year}</span>
              ${m.rating ? `<span class="card-rating">★ ${m.rating}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function renderWatchlist() {
      if (!watchlist.length) {
        document.getElementById('movieGrid').innerHTML = emptyState('Your watchlist is empty', 'Browse movies and tap ☆ to save them here.');
        document.getElementById('pagination').innerHTML = '';
        document.getElementById('sectionTitle').textContent = 'Watchlist';
        document.getElementById('sectionCount').textContent = '';
        return;
      }
      renderSkeletons(watchlist.length);
      document.getElementById('sectionTitle').textContent = 'Watchlist';
      document.getElementById('sectionCount').textContent = `${watchlist.length} saved`;
      // Fetch each saved movie
      Promise.all(watchlist.map(id =>
        fetch(`${WORKER}/movie?movie_id=${id}`).then(r => r.json()).catch(() => null)
      )).then(results => {
        const movies = results.filter(Boolean).map(r => r.data?.movie).filter(Boolean);
        document.getElementById('movieGrid').innerHTML = movies.map((m,i) => movieCard(m,i)).join('');
        document.getElementById('pagination').innerHTML = '';
      });
    }

    function renderPagination() {
      const pag = document.getElementById('pagination');
      if (state.totalPages <= 1) { pag.innerHTML = ''; return; }
      const p = state.page;
      const t = state.totalPages;
      let html = `<button class="page-btn" onclick="goPage(${p-1})" ${p===1?'disabled':''}>← Prev</button>`;
      const pages = new Set([1, 2, p-1, p, p+1, t-1, t].filter(n => n >= 1 && n <= t));
      let last = 0;
      [...pages].sort((a,b)=>a-b).forEach(n => {
        if (last && n - last > 1) html += `<span style="color:var(--text-dim);padding:0 0.25rem">…</span>`;
        html += `<button class="page-btn ${n===p?'active':''}" onclick="goPage(${n})">${n}</button>`;
        last = n;
      });
      html += `<button class="page-btn" onclick="goPage(${p+1})" ${p===t?'disabled':''}>Next →</button>`;
      pag.innerHTML = html;
    }

    function updateSectionMeta() {
      const title = document.getElementById('sectionTitle');
      const count = document.getElementById('sectionCount');
      if (state.query) title.textContent = `Results for "${state.query}"`;
      else if (state.genre) title.textContent = state.genre.charAt(0).toUpperCase() + state.genre.slice(1);
      else title.textContent = 'Popular Movies';
      count.textContent = state.totalMovies ? `${state.totalMovies.toLocaleString()} titles` : '';
    }

    function emptyState(h, p) {
      return `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🎬</div><h3>${h}</h3><p>${p}</p></div>`;
    }

    function renderError() {
      document.getElementById('movieGrid').innerHTML = emptyState('Could not load movies', 'Check your connection or try again.');
    }

    function goToMovie(id, imdb) {
      location.href = `movie.html?id=${id}&imdb_id=${imdb}`;
    }

    function goPage(n) {
      if (n < 1 || n > state.totalPages) return;
      state.page = n;
      window.scrollTo({top: 0, behavior: 'smooth'});
      fetchMovies();
    }

    function toggleWatchlist(e, id) {
      e.stopPropagation();
      const idx = watchlist.indexOf(id);
      if (idx === -1) { watchlist.push(id); showToast('Added to watchlist'); }
      else { watchlist.splice(idx, 1); showToast('Removed from watchlist'); }
      localStorage.setItem('dht_watchlist', JSON.stringify(watchlist));
      if (state.watchlistOnly) fetchMovies();
      else {
        const btn = e.currentTarget;
        btn.classList.toggle('saved', watchlist.includes(id));
        btn.textContent = watchlist.includes(id) ? '★' : '☆';
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    function escQ(s) { return String(s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    // ── Event bindings ──
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(state.debounceTimer);
      state.debounceTimer = setTimeout(() => {
        state.query = e.target.value.trim();
        state.page = 1;
        fetchMovies();
      }, 300);
    });

    document.getElementById('genrePills').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      state.genre = pill.dataset.genre;
      state.page = 1;
      state.watchlistOnly = false;
      document.getElementById('watchlistToggle').classList.remove('active');
      fetchMovies();
    });

    document.getElementById('sortSelect').addEventListener('change', e => {
      state.sort = e.target.value;
      state.page = 1;
      fetchMovies();
    });

    document.getElementById('watchlistToggle').addEventListener('click', () => {
      state.watchlistOnly = !state.watchlistOnly;
      document.getElementById('watchlistToggle').classList.toggle('active', state.watchlistOnly);
      state.page = 1;
      fetchMovies();
    });

    // ── Start ──
    fetchMovies();
  </script>
</body>
</html>
